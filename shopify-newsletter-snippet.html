<form id="dof-newsletter-form" style="display:flex;gap:8px;flex-wrap:wrap">
  <input
    id="dof-newsletter-email"
    type="email"
    name="email"
    placeholder="Deine E-Mail"
    required
    style="flex:1;min-width:220px;padding:12px;border:1px solid #222;background:#111;color:#fff;border-radius:6px"
  >
  <button
    type="submit"
    style="padding:12px 18px;border:0;background:#e11d48;color:#fff;border-radius:6px;font-weight:700"
  >
    Anmelden
  </button>
  <div id="dof-newsletter-message" style="width:100%;font-size:13px;margin-top:6px"></div>
</form>

<script>
  document.getElementById("dof-newsletter-form").addEventListener("submit", async function (event) {
    event.preventDefault();
    const message = document.getElementById("dof-newsletter-message");
    const email = document.getElementById("dof-newsletter-email").value;
    message.textContent = "Wird angemeldet...";
    try {
      const response = await fetch("https://dof-d.vercel.app/api/newsletter-subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, source: "shopify" })
      });
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.error || "Anmeldung fehlgeschlagen");
      message.textContent = "Danke. Du bist im DOF Newsletter eingetragen.";
      event.target.reset();
    } catch (error) {
      message.textContent = "Fehler: " + error.message;
    }
  });
</script>
